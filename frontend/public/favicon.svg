<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8192c"/>
      <stop offset="50%"  stop-color="#c0101f"/>
      <stop offset="100%" stop-color="#1a6fc4"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8192c"/>
      <stop offset="100%" stop-color="#c0101f"/>
    </linearGradient>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a6fc4"/>
      <stop offset="100%" stop-color="#1558a0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Outer rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Silver/white border frame -->
  <rect x="3" y="3" width="58" height="58" rx="11" ry="11"
        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- TOP RED HALF — "JEE इंडिया" section -->
  <rect x="5" y="5" width="54" height="27" rx="9" ry="9" fill="url(#topGrad)"/>

  <!-- BOTTOM BLUE HALF — "NEWS" section -->
  <rect x="5" y="32" width="54" height="27" rx="9" ry="9" fill="url(#botGrad)"/>

  <!-- Center divider line -->
  <rect x="5" y="30.5" width="54" height="3" fill="rgba(255,255,255,0.25)"/>

  <!-- "J" letter — bold white, top section -->
  <text x="32" y="26"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="22"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#shadow)"
        letter-spacing="-1">J</text>

  <!-- "NEWS" text — bold italic white, bottom section -->
  <text x="32" y="47"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-style="italic"
        font-size="13"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#shadow)"
        letter-spacing="0.5">NEWS</text>

  <!-- Shine overlay top-left -->
  <ellipse cx="20" cy="16" rx="18" ry="10"
           fill="rgba(255,255,255,0.1)" transform="rotate(-20 20 16)"/>
</svg>
